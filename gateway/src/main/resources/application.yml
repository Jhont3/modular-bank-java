spring:
  application:
    name: finbank-gateway
  cloud:
    gateway:
      routes:
        # Strangler Fig: el tráfico de los módulos extraídos va a los microservicios…
        - id: notifications-ms
          uri: ${NOTIFICATIONS_URI:http://localhost:8082}
          predicates:
            - Path=/notifications/**
        - id: transfers-ms
          uri: ${TRANSFERS_URI:http://localhost:8083}
          predicates:
            - Path=/transfers/**
        # …y el resto sigue hacia el monolito remanente (auth, accounts, audit).
        # Las rutas /internal/** NO se exponen: solo existen en la red interna.
        - id: monolith
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/auth/**,/accounts/**,/audit/**

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
  endpoint:
    health:
      show-details: always
