# Proxy del portal FinBank (:8085) — composición de microfrontends + API.
# Todo es mismo-origen para el browser: no hay CORS y el JWT nunca cruza dominios.
upstream shell_upstream         { server portal-shell:80; }
upstream notifications_upstream { server portal-mfe-notifications:80; }
upstream transfers_upstream     { server portal-mfe-transfers:80; }
upstream gateway_upstream       { server gateway:8080; }

server {
    listen 80;

    # App Shell (SPA)
    location / {
        proxy_pass http://shell_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # remoteEntry.js + chunks de cada MFE (cargados por el shell en runtime)
    location /mfe/notifications/ {
        proxy_pass http://notifications_upstream/;
        proxy_set_header Host $host;
    }

    location /mfe/transfers/ {
        proxy_pass http://transfers_upstream/;
        proxy_set_header Host $host;
    }

    # Stream SSE: sin buffering y sin timeout corto (heartbeat cada 25s)
    location /api/transfers/stream {
        proxy_pass http://gateway_upstream/transfers/stream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # API de negocio → API Gateway (Spring Cloud Gateway)
    location /api/ {
        proxy_pass http://gateway_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
