spring:
  application:
    name: finbank-monolith
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/modular_bank}
    username: ${DB_USER:bank}
    password: ${DB_PASSWORD:bank}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    transfers-topic: ${TRANSFERS_TOPIC:finbank.transfers.events.v1}

jwt:
  secret: ${JWT_SECRET:modular-bank-dev-secret-change-in-production-256bit}
  access-expiration-minutes: 15
  refresh-expiration-days: 7

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
