global:
  scrape_interval: 15s

scrape_configs:
  # Métricas de los servicios (gateway, MSs, monolito) vía OTel Collector
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
  # Consumer lag por grupo (requisito Paso 4)
  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']
